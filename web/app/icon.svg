<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#050e06"/>

  <!-- Radar rings — outer to inner, stepping up in brightness -->
  <circle cx="16" cy="16" r="13"  stroke="#14532d" stroke-width="1"/>
  <circle cx="16" cy="16" r="8.5" stroke="#166534" stroke-width="1"/>
  <circle cx="16" cy="16" r="4"   stroke="#15803d" stroke-width="1.2"/>

  <!-- Crosshair lines — very subtle -->
  <line x1="16" y1="3"  x2="16" y2="29" stroke="#14532d" stroke-width="0.7"/>
  <line x1="3"  y1="16" x2="29" y2="16" stroke="#14532d" stroke-width="0.7"/>

  <!-- Radar sweep line — points toward the blip -->
  <line x1="16" y1="16" x2="26.5" y2="6.5" stroke="#22c55e" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Blip glow halo -->
  <circle cx="25" cy="8" r="3.6" fill="#22c55e" opacity="0.25"/>
  <!-- Blip core -->
  <circle cx="25" cy="8" r="2.2" fill="#22c55e"/>
  <!-- Blip highlight -->
  <circle cx="25" cy="8" r="1"   fill="#86efac"/>

  <!-- Center pivot -->
  <circle cx="16" cy="16" r="1.8" fill="#4ade80"/>
</svg>
